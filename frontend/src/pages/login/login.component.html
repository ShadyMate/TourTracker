<div class="auth-container">
  <nav class="back-nav">
    <button class="back-link" (click)="goToHome()">&#8592; Back to Home</button>
  </nav>
  <div class="auth-card">
    <div class="auth-header">
      <h1>TourTracker</h1>
      <p class="subtitle">{{ isLoginMode() ? 'Welcome Back' : 'Join Our Community' }}</p>
    </div>

    @if (error()) {
      <div class="error-message">
        <span class="error-icon">⚠️</span>
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="auth-form">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          placeholder="your_username"
          required>
      </div>

      <!-- Email (register only) -->
      @if (!isLoginMode()) {
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="your@email.com">
        </div>
      }

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="••••••••"
          required>
        @if (!isLoginMode()) {
          <small class="password-hint">At least 6 characters</small>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="loading-spinner"></span>
          {{ isLoginMode() ? 'Logging in...' : 'Creating Account...' }}
        } @else {
          {{ isLoginMode() ? 'Login' : 'Create Account' }}
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>{{ isLoginMode() ? "Don't have an account?" : 'Already have an account?' }}</p>
      <button type="button" class="toggle-link" (click)="toggleMode()">
        {{ isLoginMode() ? 'Sign Up' : 'Login' }}
      </button>
    </div>
  </div>
</div>
