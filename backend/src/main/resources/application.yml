spring:
  application:
    name: TourTracker Backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tour_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
    open-in-view: false

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null

# Logging Configuration
logging:
  level:
    root: INFO
    '[org.example.backend]': DEBUG
    '[org.springframework.web]': INFO
    '[org.springframework.security]': DEBUG
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.type.descriptor.sql.BasicBinder]': TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/tourtracker.log
    max-size: 10MB
    max-history: 30

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# JWT Authentication
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcklzQVZlcnlMb25nU2VjcmV0S2V5Rm9yVG91clRyYWNrZXJKV1RBdXRoZW50aWNhdGlvbjIwMjQ=}
    expiration-ms: 86400000  # 24 hours

# API Documentation
springdoc:
  swagger-ui:
    path: /docs
    enabled: true
  api-docs:
    path: /api-docs
