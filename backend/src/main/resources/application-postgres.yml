spring:
  config:
    activate:
      on-profile: postgres

  # PostgreSQL datasource placeholder.
  # Fill these values when the PostgreSQL database is added.
  datasource:
    url: ${POSTGRES_URL:}
    username: ${POSTGRES_USERNAME:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # Hibernate settings for PostgreSQL.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false