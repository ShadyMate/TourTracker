services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tour_tracker
      POSTGRES_USER: tourtracker
      POSTGRES_PASSWORD: tourtracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourtracker -d tour_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tour_tracker
      DB_USERNAME: tourtracker
      DB_PASSWORD: tourtracker
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        ORS_API_KEY: ${ORS_API_KEY}
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
