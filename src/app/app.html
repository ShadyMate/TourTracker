<main class="search-page">
	<p class="display-text">{{ searchText() || 'Type something...' }}</p>

	<label for="search-input">Search</label>
	<input
		id="search-input"
		type="search"
		[value]="searchText()"
		(input)="onSearchInput($event)"
		placeholder="Start typing"
	>
	<button onclick="function()">Submit</button>
	<input type="text">
</main>
